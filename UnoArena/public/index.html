<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uno Arena</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a24; color: #f5f5f7; text-align: center; margin: 0; padding: 20px; }
        h1 { margin-bottom: 5px; color: #ff7675; text-transform: uppercase; letter-spacing: 2px; }
        .screen { display: none; max-width: 600px; margin: 40px auto; padding: 30px; background: #242432; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .active { display: block; }
        
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; font-size: 16px; }
        input { background: #323248; color: white; border: 1px solid #444; }
        button { background: #0984e3; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #74b9ff; }
        button:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.5; }
        
        .card { display: inline-block; width: 85px; height: 130px; border-radius: 10px; margin: 8px; line-height: 130px; font-weight: bold; font-size: 18px; cursor: pointer; color: white; border: 3px solid white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .card:hover { transform: translateY(-10px); }
        .red { background: linear-gradient(135deg, #ff7675, #d63031); }
        .blue { background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .green { background: linear-gradient(135deg, #55efc4, #00b894); }
        .yellow { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); color: #2d3436; text-shadow: none; }
        .black { background: linear-gradient(135deg, #636e72, #2d3436); }
        .disabled { pointer-events: none !important; opacity: 0.4; transform: none !important; }
        
        #colorPicker { display: none; margin: 20px padding: 15px; background: #2d2d3f; border-radius: 8px; }
        .color-row { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .color-btn { width: 50px; height: 50px; cursor: pointer; border-radius: 50%; border: 2px solid white; }
        
        .game-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .pile-container { display: flex; justify-content: center; align-items: center; gap: 40px; margin: 20px 0; }
        .opponents-box { background: #2d2d3f; padding: 15px; border-radius: 8px; width: 100%; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>🃏 Uno Arena 🃏</h1>

    <div id="lobbyScreen" class="screen active">
        <input type="text" id="playerName" placeholder="Oyuncu Adın..." required>
        <button onclick="createRoom()" style="background: #20bf6b;">Oda Oluştur (Host)</button>
        <div style="margin: 15px 0; color: #888;">- VEYA -</div>
        <input type="text" id="roomCodeInput" placeholder="Oda Kodu Gir...">
        <button onclick="joinRoom()">Odaya Katıl</button>
    </div>

    <div id="waitingScreen" class="screen">
        <h2>Oda Kodu: <span id="displayRoomCode" style="color: #fdcb6e;"></span></h2>
        <div class="opponents-box">
            <h3>Bağlı Oyuncular:</h3>
            <ul id="playerList" style="list-style: none; padding: 0; font-size: 18px; line-height: 2;"></ul>
        </div>
        <button id="startBtn" style="display:none; background: #6c5ce7;" onclick="startGame()">Oyunu Başlat</button>
        <p id="waitingNotice" style="color: #aaa;">Hostun oyunu başlatması bekleniyor...</p>
    </div>

    <div id="gameScreen" class="screen" style="max-width: 800px;">
        <div class="opponents-box" id="opponents"></div>
        
        <h2 id="turnStatus">Yükleniyor...</h2>
        
        <div class="pile-container">
            <div>
                <p>Yerdeki Kart</p>
                <div id="topCard"></div>
            </div>
            <div>
                <p>Deste</p>
                <button id="drawCardBtn" onclick="drawCard()" style="height: 130px; width: 90px; border-radius: 10px; background: #e84393;">Kart Çek</button>
            </div>
        </div>

        <div id="colorPicker">
            <h3>Büyülü Kart! Bir Renk Seç:</h3>
            <div class="color-row">
                <div class="color-btn red" onclick="selectColor('red')"></div>
                <div class="color-btn blue" onclick="selectColor('blue')"></div>
                <div class="color-btn green" onclick="selectColor('green')"></div>
                <div class="color-btn yellow" onclick="selectColor('yellow')"></div>
            </div>
        </div>

        <h3>Senin Kartların:</h3>
        <div id="myCards"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoomCode = "";

        function createRoom() {
            const name = document.getElementById('playerName').value.trim();
            if(!name) return alert("Lütfen bir isim gir!");
            socket.emit('createRoom', { name });
        }

        function joinRoom() {
            const name = document.getElementById('playerName').value.trim();
            const roomCode = document.getElementById('roomCodeInput').value.trim();
            if(!name || !roomCode) return alert("İsim ve Oda Kodu girmelisin!");
            socket.emit('joinRoom', { name, roomCode });
        }

        function startGame() {
            socket.emit('startGame', currentRoomCode);
        }

        function drawCard() {
            socket.emit('drawCard', currentRoomCode);
        }

        function selectColor(color) {
            socket.emit('colorSelected', { roomCode: currentRoomCode, color: color });
            document.getElementById('colorPicker').style.display = 'none';
        }

        // --- SUNUCUDAN GELEN EVENTLER ---
        socket.on('roomCreated', (data) => {
            currentRoomCode = data.roomCode;
            document.getElementById('displayRoomCode').innerText = data.roomCode;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('waitingNotice').style.display = 'none';
            showScreen('waitingScreen');
            updatePlayerList(data.players);
        });

        socket.on('playerJoined', (data) => {
            showScreen('waitingScreen');
            updatePlayerList(data.players);
        });

        socket.on('gameStateUpdate', (state) => {
            showScreen('gameScreen');
            
            const turnStatus = document.getElementById('turnStatus');
            const drawBtn = document.getElementById('drawCardBtn');
            
            // Sıra ve Kilit Kontrolleri
            if (state.pendingColorChange) {
                turnStatus.innerHTML = `🎨 Renk seçimi bekleniyor...`;
                drawBtn.disabled = true;
                
                // Renk seçecek kişi bu socket mi?
                if (state.isMyTurn && socket.id === state.activeColorChooserId) {
                    document.getElementById('colorPicker').style.display = 'block';
                } else {
                    document.getElementById('colorPicker').style.display = 'none';
                }
            } else {
                document.getElementById('colorPicker').style.display = 'none';
                if (state.isMyTurn) {
                    turnStatus.innerHTML = "<span style='color:#55efc4;'>🟢 SIRA SENDE!</span>";
                    drawBtn.disabled = false;
                } else {
                    turnStatus.innerHTML = `🟡 Sıra: <span style='color:#ffeaa7;'>${state.currentTurnName}</span>`;
                    drawBtn.disabled = true;
                }
            }

            // Ortadaki Son Kartı Çizdirme
            const top = state.discardPile[state.discardPile.length - 1];
            const topCardDiv = document.getElementById('topCard');
            topCardDiv.className = `card ${top.color}`;
            topCardDiv.innerText = top.value;

            // Kendi Kartlarımı Senkronize Etme (Sıra bende değilse veya renk seçiliyorsa tıklanamaz yap)
            const myCardsDiv = document.getElementById('myCards');
            myCardsDiv.innerHTML = "";
            state.myCards.forEach(card => {
                const cardEl = document.createElement('div');
                const isClickable = state.isMyTurn && !state.pendingColorChange;
                cardEl.className = `card ${card.color} ${!isClickable ? 'disabled' : ''}`;
                cardEl.innerText = card.value;
                cardEl.onclick = () => {
                    if (isClickable) {
                        socket.emit('playCard', { roomCode: currentRoomCode, card: card });
                    }
                };
                myCardsDiv.appendChild(cardEl);
            });

            // Rakipler paneli
            const opponentsDiv = document.getElementById('opponents');
            opponentsDiv.innerHTML = "<h3>Rakiplerin Kart Durumları</h3>";
            state.opponents.forEach(opp => {
                opponentsDiv.innerHTML += `<span>• <b>${opp.name}:</b> ${opp.cardCount} Kart &nbsp;&nbsp;&nbsp;&nbsp;</span>`;
            });
        });

        socket.on('gameOver', (data) => {
            alert(`🎉 Oyun Bitti! Kazanan Muhteşem Oyuncu: ${data.winner}`);
            location.reload();
        });

        socket.on('errorMsg', (msg) => {
            alert(msg);
        });

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function updatePlayerList(players) {
            const list = document.getElementById('playerList');
            list.innerHTML = "";
            players.forEach(p => {
                list.innerHTML += `<li>⚡ ${p.name}</li>`;
            });
        }
    </script>
</body>
</html>
